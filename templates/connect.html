<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Подключение — Банная аналитика</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f5f5f5; display: flex; align-items: center;
         justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 16px; padding: 40px;
          width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .logo { font-size: 24px; font-weight: 700; color: #111; margin-bottom: 6px; }
  .logo span { color: #2563eb; }
  .sub { font-size: 14px; color: #666; margin-bottom: 32px; }
  label { display: block; font-size: 13px; font-weight: 500;
          color: #444; margin-bottom: 6px; }
  input { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb;
          border-radius: 10px; font-size: 15px; outline: none;
          transition: border .2s; margin-bottom: 16px; }
  input:focus { border-color: #2563eb; }
  button { width: 100%; padding: 13px; background: #2563eb; color: #fff;
           border: none; border-radius: 10px; font-size: 15px;
           font-weight: 600; cursor: pointer; transition: background .2s; }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #93c5fd; cursor: not-allowed; }
  .msg { margin-top: 16px; padding: 12px 14px; border-radius: 10px;
         font-size: 14px; display: none; }
  .msg.error { background: #fef2f2; color: #b91c1c; display: block; }
  .msg.success { background: #f0fdf4; color: #15803d; display: block; }
  .salon-id { background: #eff6ff; border-radius: 8px; padding: 10px 14px;
              font-size: 13px; color: #1d4ed8; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Банная <span>аналитика</span></div>
  <div class="sub">Аналитика для вашего бизнеса в YCLIENTS</div>

  <div class="salon-id">Филиал: #{{ salon_id }}</div>

  <form id="form">
    <input type="hidden" name="salon_id" value="{{ salon_id }}">

    <label>Логин YCLIENTS (email)</label>
    <input type="email" name="login" placeholder="you@example.com" required>

    <label>Пароль YCLIENTS</label>
    <input type="password" name="password" placeholder="••••••••" required>

    <button type="submit" id="btn">Подключить аналитику</button>
  </form>
  <div class="msg" id="msg"></div>
</div>

<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  btn.textContent = 'Подключаем...';
  msg.className = 'msg';

  const fd = new FormData(e.target);
  const res = await fetch('/activate', { method: 'POST', body: fd });
  const data = await res.json();

  if (data.success) {
    msg.className = 'msg success';
    msg.textContent = data.message;
    setTimeout(() => window.location.href = data.redirect, 1000);
  } else {
    msg.className = 'msg error';
    msg.textContent = data.message || 'Ошибка подключения';
    btn.disabled = false;
    btn.textContent = 'Подключить аналитику';
  }
});
</script>
</body>
</html>
